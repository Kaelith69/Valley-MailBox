<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e24" />
      <stop offset="100%" stop-color="#2b2b36" />
    </linearGradient>

    <!-- Box styling -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892b0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="8" />

  <!-- Title -->
  <text x="400" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Valley Mailbox — Architecture &amp; Data Flow</text>

  <!-- FRONTEND NODE -->
  <g transform="translate(60, 160)" filter="url(#shadow)">
    <rect width="140" height="80" fill="#2d3748" rx="8" stroke="#4fd1c5" stroke-width="2" />
    <text x="70" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4fd1c5" text-anchor="middle">Client (Browser)</text>
    <text x="70" y="55" font-family="sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">HTML / CSS / JS</text>
  </g>

  <!-- HOSTING NODE -->
  <g transform="translate(330, 80)" filter="url(#shadow)">
    <rect width="140" height="80" fill="#2d3748" rx="8" stroke="#fbd38d" stroke-width="2" />
    <text x="70" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbd38d" text-anchor="middle">Firebase Hosting</text>
    <text x="70" y="55" font-family="sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Serves static assets</text>
  </g>

  <!-- FIRESTORE NODE -->
  <g transform="translate(330, 240)" filter="url(#shadow)">
    <rect width="140" height="80" fill="#2d3748" rx="8" stroke="#f6ad55" stroke-width="2" />
    <text x="70" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f6ad55" text-anchor="middle">Cloud Firestore</text>
    <text x="70" y="55" font-family="sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">NoSQL Database</text>
  </g>

  <!-- TELEGRAM NODE -->
  <g transform="translate(600, 240)" filter="url(#shadow)">
    <rect width="140" height="80" fill="#2d3748" rx="8" stroke="#63b3ed" stroke-width="2" />
    <text x="70" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#63b3ed" text-anchor="middle">Telegram App</text>
    <text x="70" y="55" font-family="sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Admin Notifications</text>
  </g>

  <!-- ARROWS & PATHS -->
  <!-- Client to Hosting (Fetch App) -->
  <path d="M 130 160 C 130 120, 230 120, 320 120" fill="none" stroke="#8892b0" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4" />
  <text x="230" y="110" font-family="sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">1. Loads App</text>

  <!-- Client to Firestore (Write Data) -->
  <path d="M 200 200 C 250 200, 250 280, 320 280" fill="none" stroke="#8892b0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="250" y="270" font-family="sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">2. addDoc()</text>

  <!-- Firestore to Webhook/Telegram -->
  <path d="M 470 280 L 590 280" fill="none" stroke="#8892b0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="530" y="270" font-family="sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">3. Make.com Hook</text>

  <!-- FIREWALL WALL (Firestore Rules) -->
  <path d="M 310 220 L 310 340" stroke="#fc8181" stroke-width="3" stroke-dasharray="6" />
  <text x="240" y="335" font-family="sans-serif" font-size="10" fill="#fc8181" text-anchor="middle">Firestore Rules</text>
  <text x="240" y="350" font-family="sans-serif" font-size="10" fill="#fc8181" text-anchor="middle">(Read/Update Denied)</text>
</svg>
