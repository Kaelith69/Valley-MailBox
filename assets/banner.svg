<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2a50" />
      <stop offset="40%" stop-color="#c46030" />
      <stop offset="75%" stop-color="#e8903a" />
      <stop offset="100%" stop-color="#f4c060" />
    </linearGradient>
    
    <!-- Wooden Border Gradient -->
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5530" />
      <stop offset="100%" stop-color="#6b3a1f" />
    </linearGradient>

    <pattern id="grass" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#3d7d18" />
      <rect width="8" height="8" fill="#326b12" />
      <rect x="8" y="8" width="8" height="8" fill="#326b12" />
    </pattern>
  </defs>

  <!-- Sky Background -->
  <rect width="800" height="250" fill="url(#skyGrad)" />
  
  <!-- Twinkling Stars (Static for SVG) -->
  <rect x="150" y="40" width="4" height="4" fill="#ffffff" opacity="0.8" />
  <rect x="300" y="80" width="4" height="4" fill="#ffffff" opacity="0.4" />
  <rect x="450" y="30" width="4" height="4" fill="#ffffff" opacity="0.9" />
  <rect x="650" y="60" width="4" height="4" fill="#ffffff" opacity="0.5" />
  <rect x="720" y="20" width="4" height="4" fill="#ffffff" opacity="0.8" />
  <rect x="80" y="70" width="4" height="4" fill="#ffffff" opacity="0.6" />

  <!-- Sun/Moon pixel -->
  <rect x="680" y="40" width="24" height="24" fill="#ffe870" />
  <rect x="676" y="44" width="32" height="16" fill="#ffe870" />
  <rect x="684" y="36" width="16" height="32" fill="#ffe870" />

  <!-- Mountains -->
  <path d="M0 200 L60 140 L120 200 L200 120 L300 200 L450 100 L600 200 L700 150 L800 200 L800 250 L0 250 Z" fill="#2e6014" />
  
  <!-- Grass Layer -->
  <rect y="210" width="800" height="40" fill="url(#grass)" />
  <rect y="210" width="800" height="4" fill="#1a3205" />

  <!-- Trees Left -->
  <g transform="translate(40, 130)">
    <rect x="12" y="40" width="8" height="40" fill="#6b3a1f" />
    <path d="M-10 40 L42 40 L16 0 Z" fill="#4c9424" />
    <path d="M-6 20 L38 20 L16 -20 Z" fill="#5aac2c" />
    <path d="M0 0 L32 0 L16 -40 Z" fill="#70c440" />
  </g>

  <!-- Trees Right -->
  <g transform="translate(730, 130)">
    <rect x="12" y="40" width="8" height="40" fill="#6b3a1f" />
    <path d="M-10 40 L42 40 L16 0 Z" fill="#4c9424" />
    <path d="M-6 20 L38 20 L16 -20 Z" fill="#5aac2c" />
    <path d="M0 0 L32 0 L16 -40 Z" fill="#70c440" />
  </g>

  <!-- Wooden Main Sign -->
  <g transform="translate(180, 70)">
    <!-- Shadow -->
    <rect x="10" y="10" width="440" height="90" fill="rgba(0,0,0,0.5)" rx="4" />
    <!-- Sign Base -->
    <rect width="440" height="90" fill="url(#woodGrad)" rx="4" stroke="#422811" stroke-width="6" />
    <!-- Inner Border Highlight -->
    <rect x="4" y="4" width="432" height="82" fill="none" stroke="#b87840" stroke-width="3" rx="2" />
    
    <!-- Corner Pegs -->
    <circle cx="16" cy="16" r="4" fill="#422811" />
    <circle cx="424" cy="16" r="4" fill="#422811" />
    <circle cx="16" cy="74" r="4" fill="#422811" />
    <circle cx="424" cy="74" r="4" fill="#422811" />

    <!-- Text -->
    <text x="220" y="55" font-family="monospace, Courier New" font-size="36" font-weight="900" fill="#f0c050" text-anchor="middle" letter-spacing="4" style="text-shadow: 2px 2px 0px #c08030;">VALLEY MAILBOX</text>
    <text x="220" y="75" font-family="monospace, Courier New" font-size="12" font-weight="bold" fill="#fdedc4" text-anchor="middle" letter-spacing="2" opacity="0.8">A FIREBASE POST OFFICE</text>
  </g>
</svg>
